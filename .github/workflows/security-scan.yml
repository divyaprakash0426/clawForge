name: Security scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
    paths:
      - "skills/**"
      - ".github/workflows/security-scan.yml"

jobs:
  skill-sentinel:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run skill-sentinel
        run: python3 skills/skill-sentinel/scripts/scan.py --format text skills/*/SKILL.md
